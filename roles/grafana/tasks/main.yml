- name: Добавление GPG ключа Grafana
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present

- name: Добавление репозитория Grafana
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present
    update_cache: yes

- name: Установка Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Запуск и включение службы Grafana
  service:
    name: grafana-server
    state: started
    enabled: yes

- name: Настроить Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
  notify: Restart Grafana

- name: Убедиться, что Grafana запущена и включена в автозапуск
  systemd:
    name: grafana-server
    state: started
    enabled: yes

- name: Создать admin-пароль
  command: grafana-cli admin reset-admin-password Grafana_2024!Secure
  become: yes
